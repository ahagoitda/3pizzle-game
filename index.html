<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#E91E63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="3Pizzle">
<meta name="description" content="3매칭 퍼즐 게임! 월드 1, 2의 다양한 스테이지에 도전하세요!">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<title>Match-3 Stage Puzzle — 3Pizzle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0f0c1a;
  font-family: 'Outfit', "Segoe UI", system-ui, -apple-system, sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* 배경 그라디언트 레이어 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(233,30,99,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 80% 90%, rgba(103,58,183,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(33,150,243,0.10) 0%, transparent 70%),
    linear-gradient(145deg, #13101f 0%, #1a0e2e 40%, #0d1a2e 100%);
  pointer-events: none;
  z-index: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 캔버스 컨테이너 */
#gameContainer {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  display: block;
  border-radius: 20px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    0 8px 40px rgba(233,30,99,0.25),
    0 24px 64px rgba(0,0,0,0.5),
    0 0 80px rgba(103,58,183,0.15);
  max-width: 100vw;
  max-height: 100vh;
  image-rendering: auto;
}

/* 로딩 폰트 숨기기 방지용 */
.font-preload {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  font-family: 'Outfit', sans-serif;
  font-size: 0;
}
</style>
</head>
<body>
<span class="font-preload">preload</span>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
</div>
<script src="effects.js"></script>
<script src="match3_levels.js"></script>
<script src="match3.js"></script>
<script src="main.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
</script>
</body>
</html>

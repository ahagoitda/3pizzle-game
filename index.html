<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#E91E63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="3Pizzle">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Triple Puzzle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e0f7fa 100%);
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  display: block;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(233, 30, 99, 0.15), 0 4px 16px rgba(0,0,0,0.08);
  max-width: 100vw;
  max-height: 100vh;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script src="effects.js"></script>
<script src="match3.js"></script>
<script src="blockpuzzle.js"></script>
<script src="mahjong.js"></script>
<script src="main.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
</script>
</body>
</html>
